<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>СолиqGuard Mini App</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="page-shell">
    <header class="page-header">
      <h1>СолиqGuard</h1>
      <p>Введите реквизиты организации или физлица</p>
    </header>

    <form id="client-form" class="form-card">
      <label class="input-group">
        <span>Название организации / ФИО</span>
        <input type="text" id="client_name" name="client_name" placeholder="ООО «СолиqGuard» или Иванов И.И." required />
      </label>

      <label class="input-group">
        <span>ИНН (9 цифр)</span>
        <input type="text" id="inn" name="inn" placeholder="123456789" pattern="\\d{9}" inputmode="numeric" required />
      </label>

      <label class="input-group">
        <span>ПИНФЛ (14 цифр)</span>
        <input type="text" id="pinfl" name="pinfl" placeholder="12345678901234" pattern="\\d{14}" inputmode="numeric" required />
      </label>

      <label class="input-group">
        <span>Номер телефона</span>
        <input type="tel" id="phone" name="phone" placeholder="+998901234567" inputmode="tel" required />
      </label>

      <button type="submit" class="submit-button">Подтвердить данные</button>
    </form>

    <p class="hint-text">После отправки данные будут переданы боту и мини-приложение закроется.</p>
  </div>

  <script>
    const form = document.getElementById('client-form');

    form.addEventListener('submit', event => {
      event.preventDefault();

      const formData = {
        client_name: document.getElementById('client_name').value.trim(),
        inn: document.getElementById('inn').value.trim(),
        pinfl: document.getElementById('pinfl').value.trim(),
        phone: document.getElementById('phone').value.trim(),
      };

      if (window.Telegram && Telegram.WebApp && typeof Telegram.WebApp.sendData === 'function') {
        Telegram.WebApp.sendData(JSON.stringify(formData));
        Telegram.WebApp.close();
      } else {
        alert('Telegram Web App не найден. Попробуйте открыть мини-приложение в Telegram.');
      }
    });
  </script>
</body>
</html>
